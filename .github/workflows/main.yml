name: Deploy to Production
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 2

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: 📂 Sync app files (excluding vendor)
      # NOTE: If you encounter ENETUNREACH or ETIMEDOUT on port 21, ensure your
      # FTP server hostname is NOT proxied by Cloudflare (set to "DNS only" / Grey Cloud).
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SERVER }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        server-dir: /public_html/
        port: 21
        protocol: ftp
        security: loose
        timeout: 700000
        state-name: .ftp-deploy-sync-state.json
        exclude: |
          .env
          phpunit.xml
          vite.config.js
          README.md
          GEMINI.md
          CLAUDE.md
          .github/**
          .gitignore
          .git/**
          .claude
          node_modules/**
          vendor/**
          tests/**
          package.json
          package-lock.json
          webpack.mix.js
